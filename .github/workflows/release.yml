name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all platforms
        run: make build-all

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          generate_release_notes: true
